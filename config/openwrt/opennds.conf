# openNDS captive portal template for the guest VLAN lab.

gatewayinterface eth1.30
maxclients 150
preauthidletimeout 30
authidletimeout 120
sessiontimeout 480
checkinterval 15
enabled 1

# Guest clients land here before being allowed out.
login_option_enabled 1
login_option_timeout 60
fasport 2050

fasremoteip 0.0.0.0
fasremotefqdn portal.lab

allowedip 192.168.30.1

gatewayname OpenWrt Smart Home Guest Portal
statuspath /usr/lib/opennds/client_params.sh
